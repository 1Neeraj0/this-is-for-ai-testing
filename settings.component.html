<div class="settings-container">
  <h1>Settings</h1>
  <form [formGroup]="settingsForm">
    <div class="form-group">
      <label>Notification Preferences</label>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" formControlName="dailyAgenda">
        <label class="form-check-label">Daily Agenda</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" formControlName="reminderNotifications">
        <label class="form-check-label">Reminder Notifications</label>
      </div>
    </div>
    <div class="form-group">
      <label>Business Hours</label>
      <div class="form-row">
        <div class="col">
          <input type="time" class="form-control" formControlName="openingTime">
        </div>
        <div class="col">
          <input type="time" class="form-control" formControlName="closingTime">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Language Preference</label>
      <select class="form-control" formControlName="language">
        <option value="en">English</option>
        <option value="hi">Hinglish</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
</div>
